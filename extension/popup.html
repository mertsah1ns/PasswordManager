<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 280px; padding: 16px; font-family: system-ui, sans-serif; font-size: 14px; margin: 0; }
    h3 { margin: 0 0 12px; font-size: 16px; color: #1c1c1e; }
    p { margin: 0 0 12px; color: #4a4a4e; line-height: 1.5; }
    .btn { display: block; width: 100%; padding: 10px; background: #30D5C8; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn:hover { background: #2bc4b8; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { font-size: 12px; color: #8e8e93; margin-top: 8px; }
    .error { color: #ff3b30; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h3>🔐 VAULT</h3>
  <p>Otomatik doldurma ve şifre kaydetme için VAULT masaüstü uygulaması açık olmalı.</p>
  <button class="btn" id="btnFill">Bu sayfayı doldur</button>
  <p class="status" id="status"></p>
  <p class="error" id="error"></p>
  <script src="popup.js"></script>
</body>
</html>
