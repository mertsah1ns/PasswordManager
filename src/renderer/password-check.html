<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'">
  <title>Şifre Üret — VAULT</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .pw-gen-window .win-chrome { background: var(--k-white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .pw-gen-window .panel-generator { flex: 1; overflow-x: hidden; overflow-y: auto; min-height: 0; }
    .pw-gen-window .gen-checkboxes {
      display: flex; flex-wrap: wrap; gap: 10px 16px; width: 100%;
    }
    .pw-gen-window .gen-options { flex-direction: column; align-items: stretch; }
    .pw-gen-window .gen-result {
      flex-wrap: wrap; align-items: stretch;
    }
    .pw-gen-window .gen-result .cmd-btn { width: 100%; justify-content: center; }
    .pw-gen-window .gen-symbol-options {
      margin-bottom: 24px; padding: 14px 16px;
      background: var(--k-bg2); border: 1px solid var(--k-border);
      border-radius: 8px;
    }
    .pw-gen-window .gen-symbol-options .field-label { margin-bottom: 8px; }
    .pw-gen-window .gen-symbol-row { display: flex; flex-wrap: wrap; gap: 12px 20px; margin-bottom: 12px; }
    .pw-gen-window .gen-symbol-custom { margin-bottom: 0; }
    .pw-gen-window .gen-symbol-custom .field-box { height: 40px; }
    .pw-gen-window .gen-result-box {
      flex: 1 1 100%; max-width: 100%; min-width: 0; width: 100%;
    }
    .pw-gen-window .gen-result-box input {
      min-width: 0; overflow-x: auto; text-overflow: clip;
      font-family: Consolas, "Courier New", monospace; font-size: 13px;
    }
    .pw-gen-window #genPwToggle,
    .pw-gen-window #genCopy { flex-shrink: 0; }
    .pw-gen-window .gen-options .field { margin-bottom: 0; }
    #notif {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--k-accent); border-radius: 8px; padding: 14px 20px;
      font-size: 14px; color: #fff;
      opacity: 0; transform: translateY(8px); transition: all 0.25s;
      pointer-events: none; z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body class="pw-gen-window">

<div class="win-chrome">
  <div class="titlebar" data-electron-drag>
    <svg class="tb-icon" viewBox="0 0 110 110" fill="none">
      <rect x="4" y="4" width="102" height="102" rx="20" fill="#1a1d25"/>
      <path d="M22 22 L55 82 L88 22" stroke="#30D5C8" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="55" cy="62" r="9" fill="#1a1d25"/>
      <rect x="51.5" y="64" width="7" height="12" rx="2" fill="#1a1d25"/>
      <circle cx="55" cy="62" r="9" stroke="#30D5C8" stroke-width="2" fill="none"/>
      <rect x="51.5" y="64" width="7" height="12" rx="2" stroke="#30D5C8" stroke-width="2" fill="none"/>
    </svg>
    <span class="tb-title">Şifre Üret — VAULT</span>
    <div class="tb-actions">
      <button class="tb-btn" id="winMinimize" title="Küçült"><i data-lucide="minus"></i></button>
      <button class="tb-btn" id="winMaximize" title="Büyüt / Geri Al"><i data-lucide="square" id="winMaxIcon"></i></button>
      <button class="tb-btn tb-btn-close" id="winClose" title="Kapat"><i data-lucide="x"></i></button>
    </div>
  </div>

  <div class="panel-generator">
    <div class="gen-header">
      <h2>Şifre Üretici</h2>
      <p>Güçlü, rastgele şifre oluşturun. Oluşturulan şifre panoya kopyalanabilir.</p>
    </div>
    <div class="gen-options">
      <div class="field">
        <div class="field-label">Şifre Tipi</div>
        <select id="genType" class="field-select" style="width: 100%; margin-bottom: 12px; height: 38px; border-radius: 6px; border: 1px solid var(--k-border); background: var(--k-bg2); color: var(--k-text); padding: 0 8px;">
          <option value="random">Rastgele Karakterler</option>
          <option value="passphrase">Türkçe Şifre Öbeği (Hatırlaması Kolay)</option>
        </select>
      </div>
      <div class="field">
        <div class="field-label" id="genLengthLabel">Uzunluk (Karakter)</div>
        <input type="number" id="genLength" min="3" max="64" value="16" class="gen-input">
      </div>
      <div class="gen-checkboxes" id="genCheckboxes">
        <label class="gen-check"><input type="checkbox" id="genUpper" checked> Büyük harf</label>
        <label class="gen-check"><input type="checkbox" id="genLower" checked> Küçük harf</label>
        <label class="gen-check"><input type="checkbox" id="genNumbers" checked> Rakam</label>
        <label class="gen-check"><input type="checkbox" id="genSymbols" checked> Özel karakter</label>
      </div>
    </div>
    <div class="gen-symbol-options" id="genSymbolOptions">
      <div class="field-label">Özel karakter grupları</div>
      <div class="gen-symbol-row">
        <label class="gen-check"><input type="checkbox" id="genSymCommon" checked> ! @ # $ % ^ & *</label>
        <label class="gen-check"><input type="checkbox" id="genSymBrackets" checked> ( ) [ ] { } &lt; &gt;</label>
        <label class="gen-check"><input type="checkbox" id="genSymOther" checked> _ - + = ; : , . ? /</label>
      </div>
      <div class="field gen-symbol-custom">
        <div class="field-label">Ek karakterler (isteğe bağlı)</div>
        <div class="field-box">
          <input type="text" id="genSymCustom" placeholder="Örn: §¬€£¥" maxlength="32">
        </div>
      </div>
    </div>
    <div class="gen-result">
      <div class="field-box gen-result-box">
        <input type="password" id="genOutput" readonly>
        <span class="field-action" id="genPwToggle" title="Göster / Gizle"><i data-lucide="eye"></i></span>
        <span class="field-action" id="genCopy" title="Kopyala"><i data-lucide="copy"></i></span>
      </div>
      <button class="cmd-btn primary" id="genGenerate"><i data-lucide="refresh-cw"></i> Yeni Oluştur</button>
    </div>
  </div>
</div>

<div id="notif"></div>

<script src="lucide.min.js"></script>
<script src="utils.js"></script>
<script src="password-check.js"></script>
</body>
</html>
